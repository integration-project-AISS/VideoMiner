# CONFIGURACIÓN DEL SERVIDOR
server.port=${PORT:8080}

# CONFIGURACIÓN DE LA BASE DE DATOS (Híbrida H2 / PostgreSQL)
# Si Railway inyecta las variables de base de datos, las usará. 
# Si no (en local), usará H2 por defecto.

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}

# Driver dinámico: Spring Boot detectará el adecuado según la URL 
# pero es recomendable dejar el de Postgres como prioridad para la nube
spring.datasource.driver-class-name=${JDBC_DRIVER:org.h2.Driver}

# CONFIGURACIÓN DE JPA / HIBERNATE
# Dialecto: Cambia automáticamente entre H2 y PostgreSQL
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# 'update' para que cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mejoras de rendimiento y compatibilidad
spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# CONSOLA H2 (Solo útil en local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-ui
# Permite que la consola sea accesible desde fuera de localhost (necesario en algunos entornos de red)
spring.h2.console.settings.web-allow-others=true